[project]
name = "a2web"
version = "0.4.0"
description = "Agent-to-Web — adaptive web fetching MCP server and CLI for AI agents."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{name = "Denis Tomilin"}]
keywords = ["mcp", "mcp-server", "model-context-protocol", "web", "scraping", "fetch", "agent", "ai", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Internet :: WWW/HTTP",
    "Framework :: AsyncIO",
]
dependencies = [
    # framework — handles MCP server, CLI, ConnectionStore, formatter, DI, schema, testing
    "a2kit>=0.26,<1",
    # http + extraction
    "curl_cffi>=0.7,<1",
    "httpx>=0.27,<1",
    "trafilatura>=1.12,<2",
    "selectolax>=0.3,<1",
    # async + observability
    "anyio>=4,<5",
    "structlog>=24,<25",
    "opentelemetry-api>=1.25,<2",
    "opentelemetry-sdk>=1.25,<2",
    "opentelemetry-exporter-otlp-proto-http>=1.25,<2",
    # resilience
    "purgatory>=3,<4",
    # cache
    "aiosqlite>=0.20,<1",
    # config
    "pydantic-settings>=2.5,<3",
    "PyYAML>=6,<7",
    "aiofiles>=25.1.0",
]

[project.optional-dependencies]
browser = ["camoufox>=0.4,<1", "playwright>=1.45,<2"]
paid = ["firecrawl-py>=1,<2"]
# v0.4: optional LLM-backed extraction + evaluation. Bare install of a2web
# stays LLM-dep-free; install with `pip install a2web[llm]` to enable the
# `ask=` parameter on the fetch tool and the eval suite.
llm = [
    "anthropic>=0.40,<1",
    "openai>=1.40,<3",
    # markdownify is the Python equivalent of WebFetch's Turndown — used by
    # WebFetchBaseline to keep HTML→markdown behavior close to Claude Code's.
    "markdownify>=0.13,<2",
]

[dependency-groups]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.24,<1",
    "pytest-cov>=5,<7",
    "ruff>=0.7,<1",
    "ty>=0.0.1a1",
    "diff-cover>=9,<10",
]

[project.scripts]
a2web = "a2web.server:main"

[tool.uv.sources]
a2kit = { git = "https://github.com/yoselabs/a2kit.git", tag = "v0.26.0" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/a2web"]

[tool.ruff]
target-version = "py311"
line-length = 140
output-format = "concise"

[tool.ruff.lint]
select = [
    "F",      # pyflakes — undefined names, unused imports
    "S",      # bandit — security
    "T10",    # leftover pdb/breakpoint()
    "T20",    # leftover print()
    "ASYNC",  # blocking-in-async detection (ASYNC100/210/230)
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # bugbear
    "C4",     # comprehensions
    "RUF",    # ruff-specific
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]  # asserts allowed in tests
"src/a2web/llm/eval/__main__.py" = ["T201"]  # CLI entry — print() is the output mechanism
"benchmarks/**" = ["T201"]  # ad-hoc benchmark scripts — print() is the output mechanism

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--cov=a2web --cov-report=xml --cov-report=term-missing --cov-fail-under=85"
