  - slug: wikipedia-markdown
    url: https://en.wikipedia.org/wiki/Markdown
    class: docs_encyclopedia
    gold_md: |
      # Markdown

      Markdown is a lightweight markup language for creating formatted text using a plain-text editor. John Gruber created Markdown in 2004 as an easy-to-read markup language. Markdown is widely used for blogging and instant messaging, and also used elsewhere in online forums, collaborative software, documentation pages, and readme files.

      The initial description of Markdown contained ambiguities and raised unanswered questions, causing implementations to both intentionally and accidentally diverge from the original version. This was addressed in 2014 when long-standing Markdown contributors released CommonMark, an unambiguous specification and test suite for Markdown.

      ## History

      Markdown was inspired by pre-existing conventions for marking up plain text in email and usenet posts, such as the earlier markup languages setext (c. 1992), Textile (c. 2002), and reStructuredText (c. 2002). In 2002 Aaron Swartz created atx and referred to it as "the true structured text format". Gruber created the Markdown language in 2004 with Swartz as his "sounding board". The goal of the language was to enable people "to write using an easy-to-read and easy-to-write plain text format, optionally convert it to structurally valid XHTML (or HTML)".

      Its key design goal was readability, that the language be readable as-is, without looking like it has been marked up with tags or formatting instructions, unlike text formatted with "heavier" markup languages, such as Rich Text Format (RTF), HTML, or even wikitext.

      Gruber wrote a Perl script, Markdown.pl, which converts marked-up text input to valid, well-formed XHTML or HTML and replaces angle brackets and ampersands with their corresponding character entity references.

      ## Rise and divergence

      As Markdown's popularity grew rapidly, many Markdown implementations appeared, driven mostly by the need for additional features such as tables, footnotes, definition lists, and Markdown inside HTML blocks. The behavior of a few of these diverged from the reference implementation, as Markdown was only characterized by an informal specification and a Perl implementation for conversion to HTML.

      At the same time, a number of ambiguities in the informal specification had attracted attention. These issues spurred the creation of tools such as Babelmark to compare the output of various implementations, and an effort by some developers of Markdown parsers for standardisation. However, Gruber has argued that complete standardization would be a mistake.

      ## Standardization

      From 2012, a group of people, including Jeff Atwood and John MacFarlane, launched what Atwood characterised as a standardisation effort. A community website now aims to "document various tools and resources available to document authors and developers, as well as implementors of the various Markdown implementations".

      In September 2014, Gruber objected to the usage of "Markdown" in the name of this effort and it was rebranded as CommonMark. CommonMark.org has published several versions of a specification, reference implementation, test suite, and "[plans] to announce a finalized 1.0 spec and test suite in 2019". No 1.0 spec has since been released, as major issues still remain unsolved.

      In March 2016, two relevant informational Internet RFCs were published. RFC 7763 introduced MIME type text/markdown. RFC 7764 discussed and registered the variants MultiMarkdown, GitHub Flavored Markdown (GFM), Pandoc, and Markdown Extra.

      ## Variants

      Websites like Bitbucket, Diaspora, GitHub, OpenStreetMap, Reddit, SourceForge, and Stack Exchange use variants of Markdown to make discussions between users easier.

      ### GitHub Flavored Markdown

      GitHub had been using its own variant of Markdown since as early as 2009, which added support for additional formatting such as tables and nesting block content inside list elements, as well as GitHub-specific features such as auto-linking references to commits, issues, usernames, and so on.

      In 2017, GitHub released a formal specification of their GitHub Flavored Markdown (GFM) that is based on CommonMark. It is a strict superset of CommonMark, following its specification exactly except for tables, strikethrough, autolinks, and task lists, which GFM adds as extensions.

      ### Markdown Extra

      Markdown Extra is a lightweight markup language based on Markdown implemented in PHP (originally), Python and Ruby. It adds features not available with regular Markdown.

      ## Examples

      Markdown supports headings, paragraphs, line breaks, text formatting (italic, bold, monospace), horizontal rules, lists, links, images, blockquotes, and HTML tags.

      ## Implementations

      Implementations of Markdown are available for over a dozen programming languages. People have also extended Markdown for additional uses; for example, Mermaid is a tool for generating diagrams from Markdown-inspired syntax.

  - slug: fowler-microservices
    url: https://martinfowler.com/articles/microservices.html
    class: essay
    gold_md: |
      # Microservices

      a definition of this new architectural term

      By James Lewis and Martin Fowler — 25 March 2014

      The term "Microservice Architecture" has sprung up over the last few years to describe a particular way of designing software applications as suites of independently deployable services. While there is no precise definition of this architectural style, there are certain common characteristics around organization around business capability, automated deployment, intelligence in the endpoints, and decentralized control of languages and data.

      ## Characteristics of a Microservice Architecture

      We cannot say there is a formal definition of the microservices architectural style, but we can attempt to describe what we see as common characteristics for architectures that fit the label.

      ### Componentization via Services

      For as long as we've been involved in the software industry, there's been a desire to build systems by plugging together components, much in the way we see things are made in the physical world. We define a component as a unit of software that is independently replaceable and upgradeable.

      Microservice architectures will use libraries, but their primary way of componentizing their own software is by breaking down into services. We define libraries as components that are linked into a program and called using in-memory function calls, while services are out-of-process components who communicate with a mechanism such as a web service request, or remote procedure call.

      ### Organized around Business Capabilities

      When looking to split a large application into parts, often management focuses on the technology layer, leading to UI teams, server-side logic teams, and database teams. The microservice approach to division is different, splitting up into services organized around business capability. Such services take a broad-stack implementation of software for that business area, including user-interface, persistant storage, and any external collaborations.

      This is mirrored by Conway's Law: "Any organization that designs a system (defined broadly) will produce a design whose structure is a copy of the organization's communication structure."

      ### Products not Projects

      Most application development efforts that we see use a project model: where the aim is to deliver some piece of software which is then considered to be complete. On completion the software is handed over to a maintenance organization and the project team that built it is disbanded.

      Microservice proponents tend to avoid this model, preferring instead the notion that a team should own a product over its full lifetime. A common inspiration for this is Amazon's notion of "you build, you run it" where a development team takes full responsibility for the software in production.

      ### Smart endpoints and dumb pipes

      When building communication structures between different processes, we've seen many products and approaches that stress putting significant smarts into the communication mechanism itself. A good example of this is the Enterprise Service Bus (ESB), where ESB products often include sophisticated facilities for message routing, choreography, transformation, and applying business rules.

      The microservice community favours an alternative approach: smart endpoints and dumb pipes. Applications built from microservices aim to be as decoupled and as cohesive as possible — they own their own domain logic and act more as filters in the classical Unix sense — receiving a request, applying logic as appropriate and producing a response.

      ### Decentralized Governance

      One of the consequences of centralised governance is the tendency to standardise on single technology platforms. Experience shows that this approach is constricting — not every problem is a nail and not every solution a hammer.

      Splitting the monolith's components out into services we have a choice when building each of them. You want to use Node.js to stand up a simple reports page? Go for it. C++ for a particularly gnarly near-real-time component? Fine.

      ### Decentralized Data Management

      Decentralization of data management presents in a number of different ways. At the most abstract level, it means that the conceptual model of the world will differ between systems. In the large, decentralizing data responsibilities does have implications for managing updates. The common approach to dealing with updates has been to use transactions to guarantee consistency when updating multiple resources. This approach is often used within monoliths.

      Using transactions like this helps with consistency, but imposes significant temporal coupling, which is problematic across multiple services. Distributed transactions are notoriously difficult to implement and as a consequence microservice architectures emphasize transactionless coordination between services, with explicit recognition that consistency may only be eventual consistency.

      ### Infrastructure Automation

      Infrastructure automation techniques have evolved enormously over the last few years — the evolution of the cloud and AWS in particular has reduced the operational complexity of building, deploying and operating microservices.

      Many of the products or systems being built with microservices are being built by teams with extensive experience of Continuous Delivery and its precursor, Continuous Integration. Teams building software this way make extensive use of infrastructure automation techniques.

      ### Design for failure

      A consequence of using services as components, is that applications need to be designed so that they can tolerate the failure of services. Any service call could fail due to unavailability of the supplier, the client has to respond to this as gracefully as possible. This is a disadvantage compared to a monolithic design as it introduces additional complexity to handle it.

      Netflix's Simian Army induces failures of services and even datacenters during the working day to test both the application's resilience and monitoring.

      ### Evolutionary Design

      Microservice practitioners, usually have come from an evolutionary design background and see service decomposition as a further tool to enable application developers to control changes in their application without slowing down change. Change control doesn't necessarily mean change reduction — with the right attitudes and tools you can make frequent, fast, and well-controlled changes to software.

      ## Are Microservices the Future?

      Our main aim in writing this article is to explain the major ideas and principles of microservices. By taking the time to do this we clearly think that the microservices architectural style is an important idea — one worth serious consideration for enterprise applications.

      We don't, however, think it's clear yet that microservices are the way forward.

      One reasonable argument we've heard is that you shouldn't start with a microservices architecture. Instead begin with a monolith, keep it modular, and split it into microservices once the monolith becomes a problem.

      So we write this with cautious optimism. So far, we've seen enough about the microservice style to feel that it can be a worthwhile road to tread. We can't say for sure where we'll end up, but one of the challenges of software development is that you can only make decisions based on the imperfect information that you currently have to hand.
