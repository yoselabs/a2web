  - slug: pypi-requests
    url: https://pypi.org/project/requests/
    class: aggregator
    gold_md: |
      # Requests

      Python HTTP for Humans.

      ## Installation

      ```bash
      python -m pip install requests
      ```

      Requests officially supports Python 3.10+.

      ## Usage

      ```python
      >>> import requests
      >>> r = requests.get('https://httpbin.org/basic-auth/user/pass', auth=('user', 'pass'))
      >>> r.status_code
      200
      >>> r.headers['content-type']
      'application/json; charset=utf8'
      >>> r.encoding
      'utf-8'
      >>> r.text
      '{"authenticated": true, ...'
      >>> r.json()
      {'authenticated': True, ...}
      ```

      Requests makes it simple to send HTTP/1.1 requests without manually adding query strings to URLs or form-encoding your PUT and POST data.

      ## Features

      Requests is one of the most downloaded Python packages, with approximately 300M downloads per week, used by 4,000,000+ repositories. It supports:

      - Keep-Alive and Connection Pooling
      - International Domains and URLs
      - Sessions with Cookie Persistence
      - Browser-style TLS/SSL Verification
      - Basic and Digest Authentication
      - Familiar dict-like Cookies
      - Automatic Content Decompression and Decoding
      - Multi-part File Uploads
      - SOCKS Proxy Support
      - Connection Timeouts
      - Streaming Downloads
      - Automatic honoring of .netrc
      - Chunked HTTP Requests

      ## License

      Apache Software License (Apache-2.0)

