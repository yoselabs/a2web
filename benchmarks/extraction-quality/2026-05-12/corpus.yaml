# Extraction-quality corpus — Reader-LM v2 trip decision (v0.6.0 starter).
#
# Honest caveat about how this gold was built: each gold_md was produced
# by Claude WebFetch with a "extract main content as clean markdown,
# drop nav/footer/sidebar" prompt. That's LLM-summarized, not raw
# hand-edit — which means:
#   - It's biased toward what a capable LLM thinks the clean content is
#   - Wikipedia / longer pages got light paraphrasing in places
#   - Trafilatura might score "low" against this gold yet still produce
#     a perfectly valid extraction — that's a "gold is wrong" signal,
#     not an extraction miss
#
# Recommended workflow:
#   1. Run the eval once
#   2. For any URL with token_f1 < 0.7 AND length_ratio in [0.8, 1.2]:
#      open the URL and the extracted markdown side-by-side; if the
#      extraction is fine, edit gold_md to match it
#   3. For URLs where extracted is clearly under (<<0.8) or over (>>1.2)
#      length, gold is the source of truth; trafilatura missed
#   4. Re-run until the corpus is calibrated, THEN trust the trip verdict
#
# Coverage gaps to fill manually:
#   - forum (HN thread, Reddit thread) — WebFetch didn't return useful data
#   - js_heavy_news (paywalled NYT/WSJ) — pick a few and hand-curate
#   - spa (Notion public, Linear public) — pick a few
#
# Class taxonomy used here:
#   essay              — long-form thought pieces (PG, Fowler)
#   blog               — personal/company blog posts
#   docs_reference     — API reference docs (MDN, Python stdlib)
#   docs_encyclopedia  — Wikipedia-style
#   aggregator         — listings (HN front, PyPI page, GitHub repo)

