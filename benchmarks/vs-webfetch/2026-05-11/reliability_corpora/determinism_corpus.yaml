    **Rust** is a general-purpose programming language which emphasizes performance,
    type safety, concurrency, and memory safety.


    Rust supports multiple programming paradigms. It was influenced by ideas from
    functional programming, including immutability, higher-order functions, algebraic
    data types, and pattern matching. It also supports object-oriented programming
    via structs, enums, traits, and methods. Rust enforces memory safety (i.e., that
    all references point to valid memory) without a conventional garbage collector;
    instead, memory safety errors and data races are prevented by the "borrow checker",
    which tracks the object lifetime of references at compile time.


    Software developer Graydon Hoare created Rust in 2006 while working at Mozilla,
    which officially sponsored the project in 2009. The first stable release, Rust
    1.0, was published in May 2015. Following a layoff of Mozilla employees in August
    2020, four other companies joined Mozilla in sponsoring Rust through the creation
    of the Rust Foundation in February 2021.


    Rust has been adopted by many software projects, especially web services and system
    software. It has been studied academically and has a growing community of developers.


    Rust began as a personal project by Mozilla employee Graydon Hoare in 2006. According
    to *MIT Technology Review*, he started the project due to his frustration with
    a broken elevator in his apartment building whose software had crashed,[16] and
    named the language after the group of fungi of the same name that is "over-engineered
    for survival".[16] During the time period between 2006 and 2009, Rust was not
    publicized to others at Mozilla and was written in Hoare''s free time;[17]: 7:50
    Hoare began speaking about the language around 2009 after a small group at Mozilla
    became interested in the project.[18] Hoare cited languages from the 1970s, 1980s,
    and 1990s as influences — including CLU, BETA, Mesa, NIL,[note 4] Erlang, Newsqueak,
    Napier, Hermes, Sather, Alef, and Limbo.[18] He described the language as "technology
    from the past come to save the future from itself."[17]: 8:17 [18] Early Rust
    developer Manish Goregaokar similarly described Rust as being based on "mostly
    decades-old research."[16]


    During the early years, the Rust compiler was written in about 38,000 lines of
    OCaml.[17]: 15:34 [19] Early Rust contained several features no longer present
    today, including explicit object-oriented programming via an `obj`


    keyword[17]: 10:08 and a typestates system for variable state changes, such as
    going from uninitialized to initialized.[17]: 13:12


    Mozilla officially sponsored the Rust project in 2009.[16] Brendan Eich and other
    executives, intrigued by the possibility of using Rust for a safe web browser
    engine, placed engineers on the project including Patrick Walton, Niko Matsakis,
    Felix Klock, and Manish Goregaokar.[16] A conference room taken by the project
    developers was dubbed "the nerd cave," with a sign placed outside the door.[16]


    During this time period, work had shifted from the initial OCaml compiler to a
    self-hosting compiler (*i.e.*, written in Rust) targeting LLVM.[20][note 5] The
    ownership system was in place by 2010.[16] The Rust logo was developed in 2011
    based on a bicycle chainring.[22]


    Rust 0.1 became the first public release on January 20, 2012[23] for Windows,
    Linux, and MacOS.[24] The early 2010s witnessed increasing involvement from full-time
    engineers at Mozilla, open source volunteers outside Mozilla, and open source
    volunteers outside the United States.[16]


    The years from 2012 to 2015 were marked by substantial changes to the Rust type
    system.[17]: 18:36 [16] Memory management through the ownership system was gradually
    consolidated and expanded. By 2013, the garbage collector was rarely used, and
    was removed in favor of the ownership system.[16] Other features were removed
    in order to simplify the language, including typestates, the `pure`


    keyword,[25] various specialized pointer types, and syntax support for channels.[17]:
    22:32


    According to Steve Klabnik, Rust was influenced during this period by developers
    coming from C++ (e.g., low-level performance of features), scripting languages
    (e.g., Cargo and package management), and functional programming (e.g., type systems
    development).[17]: 30:50


    Graydon Hoare stepped down from Rust in 2013.[16] After Hoare''s departure, it
    evolved organically under a federated governance structure, with a "core team"
    of initially six people,[17]: 21:45 and around 30-40 developers total across various
    other teams.[17]: 22:22 A Request for Comments (RFC) process for new language
    features was added in March 2014.[17]: 33:47 The core team would grow to nine
    people by 2016[17]: 21:45 with over 1600 RFCs.[17]: 34:08


    According to Andrew Binstock for *Dr. Dobb''s Journal* in January 2014, while
    Rust was "widely viewed as a remarkably elegant language", adoption slowed because
    it radically changed from version to version.[26] Rust development at this time
    focused on finalizing features for version 1.0 so that it could begin promising
    backward compatibility.[17]: 41:26


    Six years after Mozilla''s sponsorship, Rust 1.0 was published and became the
    first stable release on May 15, 2015.[16] A year later, the Rust compiler had
    accumulated over 1,400 contributors and there were over 5,000 third-party libraries
    published on the Rust package management website Crates.io.[17]: 43:15


    The development of the Servo browser engine continued in parallel with Rust, jointly
    funded by Mozilla and Samsung.[27] The teams behind the two projects worked in
    close collaboration; new features in Rust were tested out by the Servo team, and
    new features in Servo were used to give feedback back to the Rust team.[17]: 5:41
    The first version of Servo was released in 2016.[16] The Firefox web browser shipped
    with Rust code as of 2016 (version 45),[17]: 53:30 [28] but components of Servo
    did not appear in Firefox until September 2017 (version 57) as part of the Gecko
    and Quantum projects.[29]


    Improvements were made to the Rust toolchain ecosystem during the years following
    1.0 including Rustfmt, integrated development environment integration,[17]: 44:56
    and a regular compiler testing and release cycle.[17]: 46:48 Rust''s community
    gained a code of conduct and an IRC chat for discussion.[17]: 50:36


    The earliest known adoption outside of Mozilla was by individual projects at Samsung,
    Facebook (now Meta Platforms), Dropbox, and Tilde, Inc., the company behind ember.js.[17]:
    55:44 [16] Amazon Web Services followed in 2020.[16] Engineers cited performance,
    lack of a garbage collector, safety, and pleasantness of working in the language
    as reasons for the adoption. Amazon developers cited a finding by Portuguese researchers
    that Rust code used less energy compared to similar code written in Java.[16][30]


    In August 2020, Mozilla laid off 250 of its 1,000 employees worldwide, as part
    of a corporate restructuring caused by the COVID-19 pandemic.[31][32] The team
    behind Servo was disbanded. The event raised concerns about the future of Rust.[33]
    In the following week, the Rust Core Team acknowledged the severe impact of the
    layoffs and announced that plans for a Rust foundation were underway. The first
    goal of the foundation would be to take ownership of all trademarks and domain
    names and to take financial responsibility for their costs.[34]


    On February 8, 2021, the formation of the Rust Foundation was announced by five
    founding companies: Amazon Web Services, Google, Huawei, Microsoft, and Mozilla.[35][36]
    The foundation would provide financial support for Rust developers in the form
    of grants and server funding.[16] In a blog post published on April 6, 2021, Google
    announced support for Rust within the Android Open Source Project as an alternative
    to C/C++.[37]


    On November 22, 2021, the Moderation Team, which was responsible for enforcing
    the community code of conduct, announced their resignation "in protest of the
    Core Team placing themselves unaccountable to anyone but themselves".[38] In May
    2022, members of the Rust leadership council posted a public response to the incident.[39]


    The Rust Foundation posted a draft for a new trademark policy on April 6, 2023,
    which resulted in widespread negative reactions from Rust users and contributors.[40]
    The trademark policy included rules for how the Rust logo and name could be used.[40]


    Rust''s syntax is similar to that of C and C++,[41][42] although many of its features
    were influenced by functional programming languages such as OCaml.[43] Hoare has
    described Rust as targeted at frustrated C++ developers.[18]


    Below is a "Hello, World!" program in Rust. The `fn`


    keyword denotes a function, and the `println!`


    macro (see § Macros) prints the message to standard output.[44] Statements in
    Rust are separated by semicolons.


    ```

    fn main() {

    println!("Hello, World!");

    }

    ```


    Variables in Rust are defined through the `let`


    keyword.[45] The example below assigns a value to the variable with name `foo`


    of type `i32`


    and outputs its value; the type annotation `: i32`


    can be omitted.


    ```

    fn main() {

    let foo: i32 = 10;

    println!("The value of foo is {foo}");

    }

    ```


    Variables are immutable by default, unless the `mut`


    keyword is added.[46] The following example uses `//`


    , which denotes the start of a comment.[47]


    ```

    fn main() {

    // This code would not compile without adding "mut".

    let mut foo = 10;

    println!("The value of foo is {foo}");

    foo = 20;

    println!("The value of foo is {foo}");

    }

    ```


    Multiple `let`


    expressions can define multiple variables with the same name, known as variable
    shadowing. Variable shadowing allows transforming variables without having to
    name the variables differently.[48] The example below declares a new variable
    with the same name that is double the original value:


    ```

    fn main() {

    let foo = 10;

    // This will output "The value of foo is 10"

    println!("The value of foo is {foo}");

    let foo = foo * 2;

    // This will output "The value of foo is 20"

    println!("The value of foo is {foo}");

    }

    ```


    Variable shadowing is also possible for values of different types. For example,
    going from a string to its length:


    ```

    fn main() {

    let letters = "abc";

    let letters = letters.len();

    }

    ```


    A *block expression* is delimited by curly brackets. When the last expression
    inside a block does not end with a semicolon, the block evaluates to the value
    of that trailing expression:[49]


    ```

    fn main() {

    let x = {

    println!("this is inside the block");

    1 + 2

    };

    println!("1 + 2 = {x}");

    }

    ```


    Trailing expressions of function bodies are used as the return value:[50]


    ```

    fn add_two(x: i32) -> i32 {

    x + 2

    }

    ```


    `if`


    expressionsAn `if`


    conditional expression executes code based on whether the given value is `true`


    . `else`


    can be used for when the value evaluates to `false`


    , and `else if`


    can be used for combining multiple expressions.[51]


    ```

    fn main() {

    let x = 10;

    if x > 5 {

    println!("value is greater than five");

    }

    if x % 7 == 0 {

    println!("value is divisible by 7");

    } else if x % 5 == 0 {

    println!("value is divisible by 5");

    } else {

    println!("value is not divisible by 7 or 5");

    }

    }

    ```


    `if`


    and `else`


    blocks can evaluate to a value, which can then be assigned to a variable:[51]


    ```

    fn main() {

    let x = 10;

    let new_x = if x % 2 == 0 { x / 2 } else { 3 * x + 1 };

    println!("{new_x}");

    }

    ```


    `while`


    loops`while`


    can be used to repeat a block of code while a condition is met.[52]


    ```

    fn main() {

    // Iterate over all integers from 4 to 10

    let mut value = 4;

    while value <= 10 {

    println!("value = {value}");

    value += 1;

    }

    }

    ```


    `for`


    loops and iteratorsFor loops in Rust loop over elements of a collection.[53]

    `for`


    expressions work over any iterator type.


    ```

    fn main() {

    // Using `for` with range syntax for the same functionality as above

    // The syntax 4..=10 means the range from 4 to 10, up to and including 10.

    for value in 4..=10 {

    println!("value = {value}");

    }

    }

    ```


    In the above code, `4..=10`


    is a value of type `Range`


    which implements the `Iterator`


    trait. The code within the curly braces is applied to each element returned by
    the iterator.


    Iterators can be combined with functions over iterators like `map`


    , `filter`


    , and `sum`


    . For example, the following adds up all numbers between 1 and 100 that are multiples
    of 3:


    ```

    (1..=100).filter(|x| x % 3 == 0).sum()

    ```


    `loop`


    and `break`


    statementsMore generally, the `loop`


    keyword allows repeating a portion of code until a `break`


    occurs. `break`


    may optionally exit the loop with a value. In the case of nested loops, labels
    denoted by `''label_name`


    can be used to break an outer loop rather than the innermost loop.[54]


    ```

    fn main() {

    let value = 456;

    let mut x = 1;

    let y = loop {

    x *= 10;

    if x > value {

    break x / 10;

    }

    };

    println!("largest power of ten that is smaller than or equal to value: {y}");

    let mut up = 1;

    ''outer: loop {

    let mut down = 120;

    loop {

    if up > 100 {

    break ''outer;

    }

    if down < 4 {

    break;

    }

    down /= 2;

    up += 1;

    println!("up: {up}, down: {down}");

    }

    up *= 2;

    }

    }

    ```


    The `match`


    and `if let`


    expressions can be used for pattern matching. For example, `match`


    can be used to double an optional integer value if present, and return zero otherwise:[55]


    ```

    fn double(x: Option<u64>) -> u64 {

    match x {

    Some(y) => y * 2,

    None => 0,

    }

    }

    ```


    Equivalently, this can be written with `if let`


    and `else`


    :


    ```

    fn double(x: Option<u64>) -> u64 {

    if let Some(y) = x {

    y * 2

    } else {

    0

    }

    }

    ```


    Rust is strongly typed and statically typed, meaning that the types of all variables
    must be known at compilation time. Assigning a value of a particular type to a
    differently typed variable causes a compilation error. Type inference is used
    to determine the type of variables if unspecified.[56]


    The type `()`


    , called the "unit type" in Rust, is a concrete type that has exactly one value.
    It occupies no memory (as it represents the absence of value). All functions that
    do not have an indicated return type implicitly return `()`


    . It is similar to `void`


    in other C-style languages, however `void`


    denotes the absence of a type and cannot have any value.


    The default integer type is `i32`


    , and the default floating point type is `f64`


    . If the type of a literal number is not explicitly provided, it is either inferred
    from the context or the default type is used.[57]


    Integer types in Rust are named based on the signedness and the number of bits
    the type takes. For example, `i32`


    is a signed integer that takes 32 bits of storage, whereas `u8`


    is unsigned and only takes 8 bits of storage. `isize`


    and `usize`


    take storage depending on the memory address bus width of the compilation target.
    For example, when building for 32-bit targets, both types will take up 32 bits
    of space.[58][59]


    By default, integer literals are in base-10, but different radices are supported
    with prefixes, for example, `0b11`


    for binary numbers, `0o567`


    for octals, and `0xDB`


    for hexadecimals. By default, integer literals default to `i32`


    as its type. Suffixes such as `4u32`


    can be used to explicitly set the type of a literal.[60] Byte literals such as
    `b''X''`


    are available to represent the ASCII value (as a `u8`


    ) of a specific character.[61]


    The Boolean type is referred to as `bool`


    which can take a value of either `true`


    or `false`


    . A `char`


    takes up 32 bits of space and represents a Unicode scalar value:[62] a Unicode
    codepoint that is not a surrogate.[63] IEEE 754 floating point numbers are supported
    with `f32`


    for single precision floats and `f64`


    for double precision floats.[64]


    Compound types can contain multiple values. Tuples are fixed-size lists that can
    contain values whose types can be different. Arrays are fixed-size lists whose
    values are of the same type. Expressions of the tuple and array types can be written
    through listing the values, and can be accessed with `.index`


    (with tuples) or `[index]`


    (with arrays):[65]


    ```

    let tuple: (u32, bool) = (3, true);

    let array: [i8; 5] = [1, 2, 3, 4, 5];

    let value = tuple.1; // true

    let value = array[2]; // 3

    ```


    Arrays can also be constructed through copying a single value a number of times:[66]


    ```

    let array2: [char; 10] = ['' ''; 10];

    ```


    Rust''s ownership system consists of rules that ensure memory safety without using
    a garbage collector. At compile time, each value must be attached to a variable
    called the *owner* of that value, and every value must have exactly one owner.[67]
    Values are moved between different owners through assignment or passing a value
    as a function parameter. Values can also be *borrowed,* meaning they are temporarily
    passed to a different function before being returned to the owner.[68] With these
    rules, Rust can prevent the creation and use of dangling pointers:[68][69]


    ```

    fn print_string(s: String) {

    println!("{}", s);

    }

    fn main() {

    let s = String::from("Hello, World");

    print_string(s); // s consumed by print_string

    // s has been moved, so cannot be used any more

    // another print_string(s); would result in a compile error

    }

    ```


    The function `print_string`


    takes ownership over the `String`


    value passed in; Alternatively, `&`


    can be used to indicate a reference type (in `&String`


    ) and to create a reference (in `&s`


    ):[70]


    ```

    fn print_string(s: &String) {

    println!("{}", s);

    }

    fn main() {

    let s = String::from("Hello, World");

    print_string(&s); // s borrowed by print_string

    print_string(&s); // s has not been consumed; we can call the function many times

    }

    ```


    Because of these ownership rules, Rust types are known as *affine types*, meaning
    each value may be used at most once. This enforces a form of software fault isolation
    as the owner of a value is solely responsible for its correctness and deallocation.[71]


    When a value goes out of scope, it is *dropped* by running its destructor. The
    destructor may be programmatically defined through implementing the `Drop`


    trait. This helps manage resources such as file handles, network sockets, and
    locks, since when objects are dropped, the resources associated with them are
    closed or released automatically.[72]


    Object lifetime refers to the period of time during which a reference is valid;
    that is, the time between the object creation and destruction.[73] These *lifetimes*
    are implicitly associated with all Rust reference types. While often inferred,
    they can also be indicated explicitly with named lifetime parameters (often denoted
    `''a`


    , `''b`


    , and so on).[74]


    A value''s lifetime in Rust is inferred from the set of locations in the source
    code (i.e., function, line, and column numbers) for which a variable is valid.[75]
    For example, a reference to a local variable has a lifetime from the expression
    it is declared in up until the last use of it.[75]


    ```

    fn main() {

    let mut x = 5; // ------------------+- Lifetime ''a

    // |

    let r = &x; // -+-- Lifetime ''b |

    // | |

    println!("r: {}", r); // -+ |

    // Since r is no longer used, |

    // its lifetime ends |

    let r2 = &mut x; // -+-- Lifetime ''c |

    } // ------------------+

    ```


    The borrow checker in the Rust compiler then enforces that references are only
    used in the locations of the source code where the associated lifetime is valid.[76][77]
    In the example above, storing a reference to variable `x`


    in `r`


    is valid, as variable `x`


    has a longer lifetime (`''a`


    ) than variable `r`


    (`''b`


    ). However, when `x`


    has a shorter lifetime, the borrow checker would reject the program:


    ```

    fn main() {

    let r; // ------------------+- Lifetime ''a

    // |

    { // |

    let x = 5; // -+-- Lifetime ''b |

    r = &x; // ERROR: x does | |

    } // not live long -| |

    // enough |

    println!("r: {}", r); // |

    } // ------------------+

    ```


    Since the lifetime of the referenced variable (`''b`


    ) is shorter than the lifetime of the variable holding the reference (`''a`


    ), the borrow checker errors, preventing `x`


    from being used from outside its scope.[78]


    Lifetimes can be indicated using explicit *lifetime parameters* on function arguments.
    For example, the following code specifies that the reference returned by the function
    has the same lifetime as `original`


    (and *not* necessarily the same lifetime as `prefix`


    ):[79]


    ```

    fn remove_prefix<''a>(mut original: &''a str, prefix: &str) -> &''a str {

    if original.starts_with(prefix) {

    original = original[prefix.len()..];

    }

    original

    }

    ```


    In the compiler, ownership and lifetimes work together to prevent memory safety
    issues such as dangling pointers.[80][81]


    User-defined types are created with the `struct`


    or `enum`


    keywords. The `struct`


    keyword is used to denote a record type that groups multiple related values.[82]
    `enum`


    s can take on different variants at runtime, with its capabilities similar to
    algebraic data types found in functional programming languages.[83] Both records
    and enum variants can contain fields with different types.[84] Alternative names,
    or aliases, for the same type can be defined with the `type`


    keyword.[85]


    The `impl`


    keyword can define methods for a user-defined type. Data and functions are defined
    separately. Implementations fulfill a role similar to that of classes within other
    languages.[86]


    The Rust standard library defines and implements many widely used custom data
    types, including core data structures such as `Vec`


    , `Option`


    , and `HashMap`


    , as well as smart pointer types. Rust provides a way to exclude most of the standard
    library using the attribute `#![no_std]`


    , for applications such as embedded devices. Internally, the standard library
    is divided into three parts, `core`


    , `alloc`


    , and `std`


    , where `std`


    and `alloc`


    are excluded by `#![no_std]`


    .[87]


    Rust uses the option type `Option<T>`


    to define optional values, which can be matched using `if let`


    or `match`


    to access the inner value:[88]


    ```

    fn main() {

    let name1: Option<&str> = None;

    // In this case, nothing will be printed out

    if let Some(name) = name1 {

    println!("{name}");

    }

    let name2: Option<&str> = Some("Matthew");

    // In this case, the word "Matthew" will be printed out

    if let Some(name) = name2 {

    println!("{name}");

    }

    }

    ```


    Similarly, Rust''s result type `Result<T, E>`


    holds either a successfully computed value (the `Ok`


    variant) or an error (the `Err`


    variant).[89] Like `Option`


    , the use of `Result`


    means that the inner value cannot be used directly; programmers must use a `match`


    expression, syntactic sugar such as `?`


    (the "try" operator), or an explicit `unwrap`


    assertion to access it. Both `Option`


    and `Result`


    are used throughout the standard library and are a fundamental part of Rust''s
    explicit approach to handling errors and missing data.


    The `&`


    and `&mut`


    reference types are guaranteed to not be null and point to valid memory.[90] The
    raw pointer types `*const`


    and `*mut`


    opt out of the safety guarantees, thus they may be null or invalid; however, it
    is impossible to dereference them unless the code is explicitly declared unsafe
    through the use of an `unsafe`


    block.[91] Unlike dereferencing, the creation of raw pointers is allowed inside
    safe Rust code.[92]


    Rust provides no implicit type conversion (coercion) between most primitive types.
    But, explicit type conversion (casting) can be performed using the `as`


    keyword.[93]


    ```

    let x: i32 = 1000;

    println!("1000 as a u16 is: {}", x as u16);

    ```


    Rust supports polymorphism through traits, generic functions, and trait objects.[94]


    Common behavior between types is declared using traits and `impl`


    blocks:[95]


    ```

    trait Zero: Sized {

    fn zero() -> Self;

    fn is_zero(&self) -> bool

    where

    Self: PartialEq,

    {

    self == &Zero::zero()

    }

    }

    impl Zero for u32 {

    fn zero() -> u32 { 0 }

    }

    impl Zero for f32 {

    fn zero() -> Self { 0.0 }

    }

    ```


    The example above includes a method `is_zero`


    which provides a default implementation that may be overridden when implementing
    the trait.[95]


    A function can be made generic by adding type parameters inside angle brackets
    (`<Num>`


    ), which only allow types that implement the trait:


    ```

    // zero is a generic function with one type parameter, Num

    fn zero<Num: Zero>() -> Num {

    Num::zero()

    }

    fn main() {

    let a: u32 = zero();

    let b: f32 = zero();

    assert!(a.is_zero() && b.is_zero());

    }

    ```


    In the examples above, `Num: Zero`


    as well as `where Self: PartialEq`


    are trait bounds that constrain the type to only allow types that implement `Zero`


    or `PartialEq`


    .[95] Within a trait or impl, `Self`


    refers to the type that the code is implementing.[96]


    Generics can be used in functions to allow implementing a behavior for different
    types without repeating the same code (see bounded parametric polymorphism). Generic
    functions can be written in relation to other generics, without knowing the actual
    type.[97]


    By default, traits use static dispatch: the compiler monomorphizes the function
    for each concrete type instance, yielding performance equivalent to type-specific
    code at the cost of longer compile times and larger binaries.[98]


    When the exact type is not known at compile time, Rust provides trait objects
    `&dyn Trait`


    and `Box<dyn Trait>`


    .[99] Trait object calls use dynamic dispatch via a lookup table; a trait object
    is a "fat pointer" carrying both a data pointer and a method table pointer.[98]
    This indirection adds a small runtime cost, but it keeps a single copy of the
    code and reduces binary size. Only "object-safe" traits are eligible to be used
    as trait objects.[100]


    This approach is similar to duck typing, where all data types that implement a
    given trait can be treated as functionally interchangeable.[101] The following
    example creates a list of objects where each object implements the `Display`


    trait:


    ```

    use std::fmt::Display;

    let v: Vec<Box<dyn Display>> = vec![

    Box::new(3),

    Box::new(5.0),

    Box::new("hi"),

    ];

    for x in v {

    println!("{x}");

    }

    ```


    If an element in the list does not implement the `Display`


    trait, it will cause a compile-time error.[102]


    Rust does not use garbage collection. Memory and other resources are instead managed
    through the "resource acquisition is initialization" convention,[103] with optional
    reference counting. Rust provides deterministic management of resources, with
    very low overhead.[104] Values are allocated on the stack by default, and all
    dynamic allocations must be explicit.[105]


    The built-in reference types using the `&`


    symbol do not involve run-time reference counting. The safety and validity of
    the underlying pointers is verified at compile time, preventing dangling pointers
    and other forms of undefined behavior.[106] Rust''s type system separates shared,
    immutable references of the form `&T`


    from unique, mutable references of the form `&mut T`


    . A mutable reference can be coerced to an immutable reference, but not vice versa.[107]


    Rust''s memory safety checks (See #Safety) may be circumvented through the use
    of `unsafe`


    blocks. This allows programmers to dereference arbitrary raw pointers, call external
    code, or perform other low-level functionality not allowed by safe Rust.[108]
    Some low-level functionality enabled in this way includes volatile memory access,
    architecture-specific intrinsics, type punning, and inline assembly.[109]


    Unsafe code is needed, for example, in the implementation of data structures.[110]
    A frequently cited example is that it is difficult or impossible to implement
    doubly linked lists in safe Rust.[111][112][113][114]


    Programmers using unsafe Rust are considered responsible for upholding Rust''s
    memory and type safety requirements, for example, that no two mutable references
    exist pointing to the same location.[115] If programmers write code which violates
    these requirements, this results in undefined behavior.[115] The Rust documentation
    includes a list of behavior considered undefined, including accessing dangling
    or misaligned pointers, or breaking the aliasing rules for references.[116]


    Macros allow generation and transformation of Rust code to reduce repetition.
    Macros come in two forms, with *declarative macros* defined through `macro_rules!`


    , and *procedural macros*, which are defined in separate crates.[117][118]


    A declarative macro (also called a "macro by example") is a macro, defined using
    the `macro_rules!`


    keyword, that uses pattern matching to determine its expansion.[119][120] Below
    is an example that sums over all its arguments:


    ```

    macro_rules! sum {

    ( $initial:expr $(, $expr:expr )* $(,)? ) => {

    $initial $(+ $expr)*

    }

    }

    fn main() {

    let x = sum!(1, 2, 3);

    println!("{x}"); // prints 6

    }

    ```


    In this example, the macro named `sum`


    is defined using the form `macro_rules! sum {`


    `(...) => { ... } }`


    . The first part inside the parentheses of the definition, the macro pattern `(
    $initial:expr $(, $expr:expr )* $(,)? )`


    specifies the structure of input it can take. Here, `$initial:expr`


    represents the first expression, while `$(, $expr:expr )*`


    means there can be zero or more additional comma-separated expressions after it.
    The trailing `$(,)?`


    allows the caller to optionally include a final comma without causing an error.
    The second part after the arrow `=>`


    describes what code will be generated when the macro is invoked. In this case,
    `$initial $(+ $expr)*`


    means that the generated code will start with the first expression, followed by
    a `+`


    and each of the additional expressions in sequence. The `*`


    again means "repeat this pattern zero or more times". This means, when the macro
    is later called in line 8, as `sum!(1, 2, 3)`


    the macro will resolve to `1 + 2 + 3`


    representing the addition of all of the passed expressions.


    Procedural macros are Rust functions that run and modify the compiler''s input
    token stream, before any other components are compiled. They are generally more
    flexible than declarative macros, but are more difficult to maintain due to their
    complexity.[121][122]


    Procedural macros come in three flavors:


    `custom!(...)`


    `#[derive(CustomDerive)]`


    `#[custom_attribute]`


    Rust supports the creation of foreign function interfaces (FFI) through the `extern`


    keyword. A function that uses the C calling convention can be written using `extern
    "C" fn`


    . Symbols can be exported from Rust to other languages through the `#[unsafe(no_mangle)]`


    attribute, and symbols can be imported into Rust through `extern`


    blocks:[note 6][124]


    ```

    #[unsafe(no_mangle)]

    pub extern "C" fn exported_from_rust(x: i32) -> i32 { x + 1 }

    unsafe extern "C" {

    fn imported_into_rust(x: i32) -> i32;

    }

    ```


    The `#[repr(C)]`


    attribute enables deterministic memory layouts for `struct`


    s and `enum`


    s for use across FFI boundaries.[124] External libraries such as `bindgen`


    and `cxx`


    can generate Rust bindings for C/C++.[124][125]


    Safety properties guaranteed by Rust include memory safety, type safety, and data
    race freedom. As described above, these guarantees can be circumvented by using
