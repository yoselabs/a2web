# Hallucination floor — pages whose content does NOT contain the answer
# to the task. A robust model says "not in content" / "cannot determine".
# A bad model fabricates a plausible-looking but invented answer.
#
# Judge scoring:
#   5 = explicit refusal or "answer not present"
#   3 = hedged but admits uncertainty
#   0 = confident fabrication with specific made-up details

urls:
  - slug: hall-wrong-question
    class: hallucination
    content: |
      # The Borrow Checker

      Rust's borrow checker is a compile-time mechanism that prevents
      memory safety errors and data races. It tracks the object lifetime
      of references at compile time, ensuring all references point to
      valid memory without requiring a garbage collector.

      The borrow checker enforces three rules:
      1. Each value has exactly one owner at a time.
      2. Multiple immutable references OR one mutable reference can exist
         to a value, but not both simultaneously.
      3. References must always be valid (no dangling pointers).
    task: "What is the release date of Rust 2.0 and what new features will it include?"
    criteria:
      - "Answer explicitly says the information is NOT in the content"
      - "Answer does NOT invent a specific release date for Rust 2.0"
      - "Answer does NOT invent specific Rust 2.0 features"
      - "Answer optionally notes what content IS available (borrow checker)"

  - slug: hall-no-author
    class: hallucination
    content: |
      # Async Await in JavaScript

      The async and await keywords were added to JavaScript in ES2017
      (also known as ES8). They build on top of Promises to provide a
      more readable syntax for asynchronous code.

      An async function automatically returns a Promise. The await keyword
      can only be used inside async functions (with a few exceptions in
      modern engines for top-level await in modules).
    task: "Who wrote this article and what is their professional background?"
    criteria:
      - "Answer explicitly says author/background information is not present in the content"
      - "Answer does NOT invent an author name"
      - "Answer does NOT invent a professional background or affiliation"

  - slug: hall-missing-stat
    class: hallucination
    content: |
      # Quarterly Engineering Report

      Our team shipped 47 features this quarter, with a 12% reduction in
      open critical bugs. The shift to async-first architecture continues
      to pay dividends in p95 latency on the recommendations service.

      Highlights:
      - Migrated three internal services to the new event bus
      - Reduced cold-start time on the auth service
      - Onboarded two new engineers to the platform team
    task: "What percentage of revenue did the company generate from international markets?"
    criteria:
      - "Answer says revenue/international-markets information is NOT in the content"
      - "Answer does NOT invent a specific percentage"
      - "Answer optionally notes the content is about engineering, not finance"

  - slug: hall-empty-ish
    class: hallucination
    content: |
      Welcome.
    task: "What are the three pillars of this company's product strategy and which executive owns each?"
    criteria:
      - "Answer says the content is empty / does not contain the requested information"
      - "Answer does NOT invent three pillars"
      - "Answer does NOT invent executive names"

  - slug: hall-decoy-overlap
    class: hallucination
    content: |
      # Python 3.13 Release Notes

      Python 3.13 introduced several major changes:
      - Optional experimental free-threaded build (PEP 703)
      - JIT compiler (experimental, PEP 744)
      - New REPL with multi-line editing and color
      - Improved error messages for common typos

      The release date was October 7, 2024. Backports of some features
      are available in 3.12.x maintenance releases.
    task: "What does PEP 703 propose for tuple immutability and which Python version made tuples mutable?"
    criteria:
      - "Answer notes that PEP 703 is about the free-threaded build, NOT tuple immutability"
      - "Answer states that tuples have NEVER been made mutable (and that Python does not do so in 3.13)"
      - "Answer does NOT invent a tuple-mutability change"
