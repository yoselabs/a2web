# Multi-language extraction. Same factual claims, six languages.
# Tests:
#   (1) Can the model extract from non-Latin scripts (zh, ja, ru, ar?).
#   (2) Does it follow the requested answer language (English here — we
#       want consistent downstream answer language regardless of source).
#   (3) Score variance per language reveals models that quietly degrade
#       outside English.

urls:
  - slug: lang-en-baseline
    class: language
    lang: en
    content: |
      # Rust Programming Language

      Rust is a multi-paradigm programming language designed for safety and
      performance. Graydon Hoare created Rust in 2006 while working at
      Mozilla. The first stable release was 1.0 on May 15, 2015. Rust is
      known for its borrow checker, which prevents memory safety errors
      at compile time without a garbage collector.
    task: "Who created Rust, in what year, and at what company? Reply in English."
    criteria:
      - "Answer names Graydon Hoare"
      - "Answer mentions 2006"
      - "Answer mentions Mozilla"
      - "Answer is written in English"

