# Release: gate the full quality bar, then build + publish the slim MCP-server
# image to GHCR (public) so any homelab instance can `docker pull` it.
# Triggered by pushing a `v*` tag (e.g. `git tag v0.27.0 && git push --tags`).
#
# Publish is single-arch (linux/amd64). Multi-arch is deferred (see BACKLOG).
# One-time after the first successful publish: set the GHCR package
# `yoselabs/a2web` visibility to Public (repo/org → Packages → Package settings),
# otherwise the pull needs auth. See README → Deployment.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  gate:
    name: Gate (make check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Pin to the uv that produced uv.lock, for a reproducible resolve.
          version: "0.10.12"
      - name: Sync dependencies (all extras + dev)
        run: uv sync --all-extras
      - name: Install OPA (a2kit's rego lint needs the `opa` binary on PATH)
        run: |
          curl -fsSL -o opa https://github.com/open-policy-agent/opa/releases/download/v1.16.2/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version
      - name: Quality gate — lint + ty + tests (cov >=85%) + arch
        run: make check

  publish:
    name: Build + push to GHCR
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/yoselabs/a2web
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build + push (slim image)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Slim image only: no INSTALL_CLAUDE_CODE — the container's default
          # backend is OpenAI-compatible (DeepSeek).
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify published version matches the tag
        run: |
          IMG="ghcr.io/yoselabs/a2web:${{ steps.meta.outputs.version }}"
          GOT="$(docker run --rm --entrypoint python "$IMG" -c \
            "from importlib.metadata import version; print(version('a2web'))")"
          echo "tag=${{ steps.meta.outputs.version }} image=$GOT"
          test "$GOT" = "${{ steps.meta.outputs.version }}"
