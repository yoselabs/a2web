# a2web output benchmark corpus
#
# Tricky-scenario coverage — the cases that break naive fetchers:
#   listing    — index pages with a drilldown layer (gets the next_links axis)
#   comments   — deeply nested comment threads
#   affordance — the answer (or the link to it) lives on a DIFFERENT page than
#                the one fetched; a2web must surface the real link, never guess
#                or fabricate (link-affordances / ADR-0009 / ADR-0012)
# plus clean / gated / spa controls.
#
# ── STANDING RULE: never lose a case ──────────────────────────────────────
# Every time we discuss a NEW failure, edge case, or scenario — in chat, in a
# proposal, in a bug report — capture it HERE as a corpus entry the same session,
# before the context is lost. A discussed-but-unrecorded case is a regression
# waiting to happen. Phrase `criteria` against STABLE STRUCTURAL facts (not
# today's page text) so the entry survives content rotation. Mirrored in
# CLAUDE.md ("## Benchmark").
#
# Each entry:
#   slug                — filesystem-safe id
#   url                 — absolute http(s) URL
#   class               — listing | comments | affordance | clean | gated | spa
#   task                — natural-language question put to every system
#   needs               — output fields the task plausibly needs
#   criteria            — pass/fail rubric for the judge; phrased against
#                         stable structural facts so the entry survives
#                         page-content rotation
#   next_links_expected — true on listing pages; marks the cell for the
#                         next_links_picked_correctly axis

urls:
  # ─── Listing / index pages — drilldown layer, next_links axis ──────────
  - slug: hn-front
    url: https://news.ycombinator.com/
    class: listing
    next_links_expected: true
    task: "List the top 5 stories on this page, each as 'TITLE — POINTS'."
    needs: [content+links]
    criteria:
      - "Identifies 5 distinct stories from the front page"
      - "Each story has a title"
      - "Each story has a numeric points count"

  - slug: reddit-listing
    url: https://www.reddit.com/r/LocalLLaMA/
    class: listing
    next_links_expected: true
    task: "What are the current top posts in r/LocalLLaMA? Give the title and a one-line gist for the 5 most prominent."
    needs: [content+links]
    criteria:
      - "Identifies at least 5 distinct posts"
      - "Each post has a title that reads like a real submission, not navigation chrome"
      - "Posts are on-topic for r/LocalLLaMA (local LLM / inference)"

  - slug: pypi-httpx
    url: https://pypi.org/project/httpx/
    class: listing
    next_links_expected: true
    task: "What is httpx, what is its current version, and what project links (docs, source) does the page expose?"
    needs: [content+links]
    criteria:
      - "Describes httpx as a Python HTTP client"
      - "States a version number"
      - "Identifies project links such as documentation or source repository"

  - slug: gh-trending
    url: https://github.com/trending/python?since=daily
    class: listing
    next_links_expected: true
    task: "List 5 trending Python repositories today, each with its owner/name slug and a one-line description."
    needs: [content+links]
    criteria:
      - "Identifies at least 5 repositories"
      - "Each repository has an owner/name slug"
      - "Each repository has a description or language tag"

  - slug: lobste-active
    # Lobsters has no a2web site-handler, so it falls through to the generic
    # record-extract path. The structure-aware Record render (heading_text +
    # heading_link) means each row should read as `[title](url)\n  meta`
    # rather than the flat smush. This entry is the bench cell that
    # exercises that path.
    url: https://lobste.rs/active
    class: listing
    next_links_expected: true
    task: "List the 5 most active stories on this page, each as 'TITLE — TAGS — COMMENT-COUNT'."
    needs: [content+links]
    criteria:
      - "Identifies 5 distinct stories"
      - "Each story has a title that reads like a real submission, not navigation chrome"
      - "Each story has at least one tag or a comment count"

  - slug: gh-trending-best
    # Selection question over a listing — exercises answer neutrality (ADR-0012).
    # The right answer PRESENTS options + the criteria to judge on and does NOT
    # crown a single unqualified "best"; a criterion-disclosed lead is fine.
    url: https://github.com/trending/python?since=daily
    class: listing
    next_links_expected: true
    task: "Which of the trending Python repositories here is the best one to adopt, and by what criteria?"
    needs: [content+links]
    criteria:
      - "Presents multiple repositories as options rather than naming one winner in isolation"
      - "Surfaces the criteria a choice would turn on (e.g. stars, topic/fit, recency, activity)"
      - "Does NOT assert a single unqualified 'best'; any lead is tied to a stated criterion"

  # ─── Comment threads — deep nesting, the naive-fetcher trap ────────────
  - slug: reddit-comments
    # A long-archived r/programming thread — locked and immutable, so the
    # comment count never changes and the post won't be deleted. Deeply
    # nested (5+ reply levels): the naive-fetcher trap this class exists for.
    url: https://www.reddit.com/r/programming/comments/ddlc78/comments_should_be_sentences/
    class: comments
    task: "What is the original post about, and what are the two most prominent comment viewpoints?"
    needs: [content_only]
    criteria:
      - "Summarizes the original post's topic"
      - "Reports at least two distinct commenter viewpoints"
      - "Does not fabricate specific vote counts it cannot see"

  - slug: hn-item
    # id=9224 is the 2007 Dropbox launch thread — a permanently-stable HN
    # item (HN never deletes items) with a famously skeptical top comment.
    url: https://news.ycombinator.com/item?id=9224
    class: comments
    task: "What is this Hacker News discussion about, and what is the prevailing sentiment in the comments?"
    needs: [content_only]
    criteria:
      - "Identifies the linked submission's topic"
      - "Characterizes the comment-thread sentiment or main disagreement"
      - "Distinguishes the submission from the discussion about it"

  # ─── Clean HTML controls — both systems should succeed ─────────────────
  - slug: wikipedia-rust
    url: https://en.wikipedia.org/wiki/Rust_(programming_language)
    class: clean
    task: "Who designed Rust originally, what year did it first appear, and what memory-safety mechanism is it known for?"
    needs: [content_only]
    criteria:
      - "Identifies Graydon Hoare as the original designer"
      - "Names a release/appearance year (2010 first appearance or 2015 for 1.0)"
      - "Describes ownership / the borrow checker as the memory-safety mechanism"

  - slug: arxiv-abstract
    url: https://arxiv.org/abs/2401.05566
    class: clean
    task: "What is the paper's title and its main contribution in one sentence?"
    needs: [content_only]
    criteria:
      - "Identifies the paper title (Sleeper Agents …)"
      - "Summarizes the contribution: deceptive behavior persists through safety training"

  # ─── Gated — a2web's expected edge over a naive fetcher ────────────────
  - slug: medium-tag
    url: https://medium.com/tag/programming
    class: gated
    task: "What programming articles or topics are currently featured on this page?"
    needs: [content+links]
    criteria:
      - "Returns real article topics or titles, not a login/paywall stub"
      - "The topics are programming-related"

  # An aggressive anti-bot wall over a content-rich page: g2 403s every
  # server-side + headless client but renders fully in a real browser. The
  # cascade may pass it (archive snapshot) OR get a thin body the gate calls
  # `length_floor` after the 403 — either way the ADR-0009 floor holds:
  # NEVER a bare empty-but-ok result. (prescribe-browser-on-any-wall / the
  # motivating case; the systematic never-silently-miss floor.)
  - slug: g2-crm-wall
    url: https://www.g2.com/categories/crm
    class: gated
    task: "What are the top CRM products listed on this page?"
    needs: [content+links]
    criteria:
      - "EITHER returns real CRM product names (e.g. Salesforce, HubSpot), not a block/empty stub"
      - "OR, if the wall could not be passed, the result is a LOUD miss (retrieval incomplete + a try-your-own-browser hint), never a bare empty success"

  # ─── SPA — JS-rendered, raw HTML is a near-empty shell ─────────────────
  - slug: spa-react-dev
    url: https://react.dev/
    class: spa
    task: "What is React and what does this page say it is for?"
    needs: [content_only]
    criteria:
      - "Describes React as a JavaScript library for building user interfaces"
      - "Returns substantive page content rather than an empty shell"

  # ─── Affordance — answer/link lives on a SEPARATE page; surface it, never guess ─
  # These encode the cases we worked through designing `link-affordances`
  # (surface-page-links-to-extractor). Criteria are structural so they survive
  # the marketplaces rotating their catalogs.

  - slug: hepsiburada-product-reviews
    # NOTE: the prior iPhone URL (HBCV00003XABLM) rotted — delisted, now silently
    # serves a drill-bit CATEGORY listing (a2web correctly relayed it as such,
    # 2026-07-11). Swapped to a live product. Hepsiburada is server-rendered
    # (~10.8k chars, classified `product`). Verified 2026-07-11 by grepping the
    # 262 fetched links: this low-review razor carries NO `-yorumlari` anchor
    # (hepsiburada only server-renders that anchor for reviewed products — cf.
    # hepsiburada-reviews-drilldown-on-page, BIC Flex 5, which DOES). So the
    # stable behavior here is the honest-absence path (ADR-0009/0014): a2web must
    # NOT fabricate a `HBC0000FWLZQH-yorumlari` URL by pattern from the slug.
    url: https://www.hepsiburada.com/wilkinson-sword-wilkinson-swrod-hydro-5-ultimate-erkek-tiras-bicagi-sap-baslik-pm-HBC0000FWLZQH
    class: affordance
    task: "Summarize the customer reviews for this product — what do buyers say?"
    needs: [content+links]
    criteria:
      - "Does NOT fabricate or invent specific review quotes / ratings not on the fetched page"
      - "States that the reviews are not on the fetched page, scoped to THIS page's evidence (ADR-0009)"
      - "Never guesses a reviews URL that is not present on the page (ADR-0014) — surfaces a reviews drilldown ONLY if one is genuinely in the fetched HTML"
      - "Never asserts the product has no reviews at all; distinguishes 'not on this page' from 'do not exist'"

  - slug: hepsiburada-product-no-footer-options
    # Output-hygiene regression (2026-07-11): the DOM record-miner fires on the
    # site-wide FOOTER megamenu (present on every hepsiburada page), parsing 10
    # null-url category rows. On a narrow price/stock ask the LLM classifies the
    # page `product` (not `listing`), so `options` MUST be suppressed — the shelf
    # is trusted only when the model agrees it is a listing. Previously these 10
    # footer entries leaked as null-url `options`. Fixed by gating `options` on
    # structural_form=="listing" (mirrors the refinement_axes gate).
    url: https://www.hepsiburada.com/wilkinson-sword-wilkinson-swrod-hydro-5-ultimate-erkek-tiras-bicagi-sap-baslik-pm-HBC0000FWLZQH
    class: clean
    task: "What is the price of this product, its currency, and is it in stock?"
    needs: [content+links]
    criteria:
      - "Answer states the price, its currency, and the in-stock status"
      - "Does NOT emit an `options` list of site navigation / footer categories — this is a product page, not a listing"
      - "Emits no option/menu entries with a null or missing URL (page chrome is never surfaced as a selectable option)"

  - slug: hepsiburada-reviews-drilldown-on-page
    # Positive counterpart to hepsiburada-product-reviews (honest-absence): on a
    # product with many reviews (BIC Flex 5, 4.7★ / 2814 evals) hepsiburada DOES
    # server-render a real `-yorumlari` reviews anchor in the fetched HTML.
    # Verified 2026-07-11: the `…-HBCV00001XNOZN-yorumlari` URL is a genuine href
    # among the 264 fetched links (NOT in content_md prose), so a2web MUST surface
    # it as an `other_pages` drilldown — rehydrated from the closed link set, not
    # pattern-guessed by appending `-yorumlari`. This is the ADR-0014 "surface it
    # BECAUSE it is on the page" side; the razor entry is the "stay silent when it
    # is NOT" side. Whether the anchor is present is the load-bearing distinction.
    url: https://www.hepsiburada.com/bic-flex-5-tiras-bicagi-6-yedek-tiras-bicagi-canta-p-HBCV00001XNOZN
    class: affordance
    task: "Summarize the customer reviews for this product — what do buyers say?"
    needs: [content+links]
    criteria:
      - "Surfaces a reviews drilldown pointing at the on-page `-yorumlari` anchor when that anchor is genuinely in the fetched HTML"
      - "The surfaced reviews URL is traceable to a real href on the page, never fabricated by appending `-yorumlari` to the product slug (ADR-0014)"
      - "Does NOT fabricate specific review quotes / per-review ratings not present on the fetched page"
      - "Distinguishes the aggregate rating shown on-page from the individual review content that lives on the drilldown page"

  - slug: amazon-product-reviews-elsewhere
    url: https://www.amazon.com/dp/B0CHX1W1XY
    class: affordance
    task: "What are the most common complaints in the reviews?"
    needs: [content+links]
    criteria:
      - "Reports only review content actually present on the fetched page; does not fabricate complaints"
      - "If the full reviews live behind a separate link, surfaces that link as a drilldown"
      - "Honest about retrieval completeness — flags when the reviews were not fully on this page"

  - slug: koctas-product-spa-thin-fetch
    # SPA under-fetch (NOT an under-index). Koçtaş renders specs / description /
    # reviews client-side; the raw + json_synth tiers see only ~1.6k chars
    # (price/stock JSON-LD, OpenGraph, breadcrumbs). Observed 2026-07-11
    # (eval/findings_2026-07-11-also-here-underfires.md): also_here=[] is CORRECT
    # there — nothing else was fetched to index. The open question is whether
    # a2web should browser-render the SPA for completeness when the narrow answer
    # already succeeded (cost vs completeness — a separate, un-decided lever).
    url: https://www.koctas.com.tr/einhell-te-cd-18-48-li-i-darbeli-matkap-125-ah-starter-kit/p/5001125801
    class: spa
    task: "What is the price of this product, its currency, and is it in stock?"
    needs: [content]
    criteria:
      - "Answer states the price, its currency, and the stock status (from the server-rendered product JSON-LD)"
      - "Does NOT fabricate specs, features, or review content that is not in the fetched HTML (Koçtaş renders those client-side)"
      - "also_here / other_pages reflect only what was actually fetched — empty is honest here, never a guessed spec/review URL (ADR-0014)"

  - slug: wikipedia-narrow-ask-indexes
    # ADR-0015 withheld-body index: a NARROW ask on a RICH server-rendered page
    # MUST populate also_here with the unsurfaced sections. Validated 2026-07-11
    # (also-here-indexes-rich-pages): a "who created Rust and when" ask over the
    # 42k-char article yields 7 query-grammar entries (borrow checker, ecosystem
    # tools, adoption timeline, ...). Regression guard for the covered-the-PAGE
    # (not the QUESTION) prompt clause.
    url: https://en.wikipedia.org/wiki/Rust_(programming_language)
    class: clean
    task: "Who created Rust and in what year did it first appear?"
    needs: [content]
    criteria:
      - "Answer names the creator (Graydon Hoare) and the first-appeared year (2012)"
      - "also_here is NON-EMPTY — the narrow ask did not 'cover' the rich article; also_here indexes unsurfaced sections (memory-safety model, ecosystem/tooling, adoption timeline) as terse query-grammar strings, NOT full questions"
      - "also_here entries drop the verb frame and the page entity (e.g. `memory safety mechanism`, not `What is Rust's memory safety mechanism?`)"

  - slug: trendyol-listing-which-best
    url: https://www.trendyol.com/sr?q=bluetooth+kulaklik
    class: affordance
    next_links_expected: true
    task: "Which of these Bluetooth headphones is the best one to buy?"
    needs: [content+links]
    criteria:
      - "Does NOT crown a single 'best' of the fetcher's own choosing (ADR-0012 — no manufactured selection)"
      - "Presents the option space — multiple products with their disclosed metadata (price / rating) as shown"
      - "Any lead offered is criterion-disclosed ('by rating, X leads'), never an unqualified 'X is best'"
      - "Relays a source-stated preference (e.g. 'çok satan' / bestseller badge) attributed to the page, not as its own verdict"

  - slug: github-repo-issues-affordance
    url: https://github.com/astral-sh/ruff
    class: affordance
    task: "What are the currently open issues people are reporting for this project?"
    needs: [content+links]
    criteria:
      - "Recognizes the repo landing page does not itself list the open issues in detail"
      - "Surfaces the issues page as a followable link rather than inventing issue titles"
      - "Does not fabricate specific issue numbers or titles absent from the fetched page"

  - slug: contact-page-channels
    url: https://www.python.org/about/help/
    class: affordance
    task: "How can I contact them — is there an email or a specific channel?"
    needs: [content+links]
    criteria:
      - "Returns the actual contact channels present on the page (mailing lists, IRC/Discord, etc.)"
      - "If a mailto:/tel: link is present, reports its literal value (address / number), not just the label"

  - slug: incehesap-search-thin-jina-terminal
    # Retrieval-completeness hole (2026-07-15): the free ladder ended at jina with
    # a BARE `length_floor` gate verdict and a2web STOPPED — emitting only the
    # try_user_browser hint, never firing its OWN browser tier. Root cause: jina
    # (r.jina.ai) returns stripped MARKDOWN, so the block detector's browser-
    # triggering fingerprints (js_required needs `<script>`+root markers;
    # blank_page needs near-zero visible text) can't match — the thin result falls
    # to the catch-all `length_floor` bucket which carried `escalation=None`. No
    # planner rule escalates a bare length_floor (browser needs escalation.next_tier
    # =="browser"; paid needs subsystem=="js_required"), so the cascade conceded a
    # passable wall. This is the ADR-0009 floor: "a wall is an unfinished job" —
    # if a2web is confident enough to prescribe the CALLER's browser, it must try
    # its OWN (free Camoufox) first. incehesap is a JS-heavy Turkish storefront;
    # the search page renders results client-side. Structural fact: the page has a
    # real product grid that a rendered browser surfaces and jina's thin markdown
    # does not — so `status: failed` with an empty answer is WRONG here.
    url: https://www.incehesap.com/arama/?kelime=deepcool+ch160+plus
    class: gated
    task: "DeepCool CH160 PLUS case price and stock status."
    needs: [content+links]
    criteria:
      - "Does NOT terminate as `status: failed` with a null answer while only emitting a try_user_browser hint — a2web must attempt its own browser render before conceding (ADR-0009)"
      - "Either returns substantive retrieved content (product name / price / stock) OR, if genuinely walled after the browser render, states the wall honestly with retrieval_incomplete — never a silent thin miss"
      - "Does not fabricate a price or stock status not present in the retrieved page"
      - "Does not fabricate a contact address not on the page"
